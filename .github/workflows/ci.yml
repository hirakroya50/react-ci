name: CI Pipeline

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build-test-playwright:
    name: Build, Test, and Playwright
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Test Result Observer JSON Log
        if: success()
        run: |
          echo '{
            "status":"success",
            "system":"github-actions",
            "message":"Build and test completed successfully"
          }'

      - name: Test Result Observer JSON Log (Failure)
        if: failure()
        run: |
          echo '{
            "status":"failure",
            "system":"github-actions",
            "message":"Build and/or test failed"
          }'

  build-and-deploy-main:
    name: Build and Deploy to S3 (main)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload dist to S3
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: aws s3 sync dist "s3://${S3_BUCKET}" --delete

      - name: Deploy Result Observer JSON Log (Success)
        if: success()
        run: |
          echo '{
            "status":"success",
            "system":"github-actions",
            "message":"Main branch build and deploy completed successfully"
          }'

      - name: Deploy Result Observer JSON Log (Failure)
        if: failure()
        run: |
          echo '{
            "status":"failure",
            "system":"github-actions",
            "message":"Main branch build and/or deploy failed"
          }'
